services:
  botnet-api:
    build: .
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      - MODEL_DIR=/app/ModelData
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
